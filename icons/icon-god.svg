<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="godGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFF8DC"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="godGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 八角星光芒 -->
  <polygon points="32,4 37,24 58,24 41,36 48,58 32,44 16,58 23,36 6,24 27,24" 
           fill="url(#godGrad)" filter="url(#godGlow)"/>
  <!-- 内部光芒 -->
  <polygon points="32,14 35,26 48,26 38,34 42,48 32,40 22,48 26,34 16,26 29,26" 
           fill="#FFF" opacity="0.4"/>
  <!-- 中心光点 -->
  <circle cx="32" cy="32" r="6" fill="#FFF" opacity="0.8"/>
</svg>
