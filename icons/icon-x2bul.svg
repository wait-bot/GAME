<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 星星群 -->
  <polygon points="20,8 22,14 28,14 23,18 25,24 20,20 15,24 17,18 12,14 18,14" fill="url(#sparkleGrad)" filter="url(#sparkleGlow)"/>
  <polygon points="44,20 45,24 49,24 46,27 47,31 44,28 41,31 42,27 39,24 43,24" fill="url(#sparkleGrad)"/>
  <polygon points="28,36 30,42 36,42 31,46 33,52 28,48 23,52 25,46 20,42 26,42" fill="url(#sparkleGrad)" filter="url(#sparkleGlow)"/>
  <polygon points="52,40 53,44 57,44 54,47 55,51 52,48 49,51 50,47 47,44 51,44" fill="url(#sparkleGrad)"/>
  <polygon points="16,48 17,52 21,52 18,55 19,59 16,56 13,59 14,55 11,52 15,52" fill="url(#sparkleGrad)"/>
  <!-- x2 标记 -->
  <rect x="24" y="26" width="16" height="10" fill="#FFF" opacity="0.3" rx="2"/>
  <text x="32" y="34" font-family="Arial Black, sans-serif" font-size="8" fill="#FFD700" text-anchor="middle" font-weight="bold">x2</text>
</svg>
