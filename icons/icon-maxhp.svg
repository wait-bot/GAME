<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="maxHpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/>
      <stop offset="50%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#C71585"/>
    </linearGradient>
    <filter id="maxHpGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 爱心主体 -->
  <path d="M32 56 C16 42, 4 30, 4 20 C4 10, 14 4, 24 4 C28 4, 32 8, 32 8 C32 8, 36 4, 40 4 C50 4, 60 10, 60 20 C60 30, 48 42, 32 56 Z" 
        fill="url(#maxHpGrad)" filter="url(#maxHpGlow)"/>
  <!-- MAX 标记 -->
  <text x="32" y="38" font-family="Arial Black, sans-serif" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">MAX</text>
  <!-- 皇冠装饰 -->
  <polygon points="32,0 35,6 32,4 29,6" fill="#FFD700"/>
  <polygon points="24,2 27,8 24,6 21,8" fill="#FFD700"/>
  <polygon points="40,2 43,8 40,6 37,8" fill="#FFD700"/>
