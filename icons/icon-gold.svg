<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FFC125"/>
      <stop offset="70%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 钱袋主体 -->
  <ellipse cx="32" cy="42" rx="20" ry="16" fill="url(#goldGrad)" filter="url(#goldGlow)"/>
  <!-- 钱袋顶部 -->
  <path d="M16 36 Q16 24, 32 20 Q48 24, 48 36" fill="url(#goldGrad)"/>
  <!-- 袋口 -->
  <ellipse cx="32" cy="24" rx="10" ry="4" fill="#B8860B"/>
  <!-- 金币溢出 -->
  <circle cx="20" cy="18" r="6" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="1"/>
  <circle cx="32" cy="12" r="7" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="1"/>
  <circle cx="44" cy="18" r="6" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="1"/>
  <!-- $符号 -->
  <text x="32" y="46" font-family="Arial Black, sans-serif" font-size="16" fill="#B8860B" text-anchor="middle" font-weight="bold">$</text>
</svg>
