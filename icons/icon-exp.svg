<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFACD"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 星星主体 -->
  <polygon points="32,4 38,24 60,24 42,38 48,60 32,46 16,60 22,38 4,24 26,24" 
           fill="url(#starGrad)" filter="url(#starGlow)"/>
  <!-- 内部高光 -->
  <polygon points="32,14 36,24 48,24 38,32 42,44 32,36 22,44 26,32 16,24 28,24" 
           fill="#FFF" opacity="0.3"/>
</svg>
