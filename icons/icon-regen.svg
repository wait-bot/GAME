<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="regenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32CD32"/>
      <stop offset="100%" style="stop-color:#228B22"/>
    </linearGradient>
    <filter id="regenGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 十字/加号 -->
  <rect x="26" y="8" width="12" height="48" fill="url(#regenGrad)" rx="4" filter="url(#regenGlow)"/>
  <rect x="8" y="26" width="48" height="12" fill="url(#regenGrad)" rx="4"/>
  <!-- 中心高光 -->
  <circle cx="32" cy="32" r="6" fill="#90EE90" opacity="0.5"/>
  <!-- 光芒效果 -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#32CD32" stroke-width="2" opacity="0.4"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#32CD32" stroke-width="1" opacity="0.2"/>
</svg>
