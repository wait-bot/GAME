<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sizeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A"/>
      <stop offset="100%" style="stop-color:#2F2F2F"/>
    </linearGradient>
  </defs>
  <!-- 尺子 -->
  <rect x="8" y="24" width="48" height="16" fill="url(#sizeGrad)" rx="2"/>
  <!-- 刻度 -->
  <line x1="16" y1="24" x2="16" y2="32" stroke="#FFF" stroke-width="2"/>
  <line x1="24" y1="28" x2="24" y2="32" stroke="#FFF" stroke-width="1"/>
  <line x1="32" y1="24" x2="32" y2="32" stroke="#FFF" stroke-width="2"/>
  <line x1="40" y1="28" x2="40" y2="32" stroke="#FFF" stroke-width="1"/>
  <line x1="48" y1="24" x2="48" y2="32" stroke="#FFF" stroke-width="2"/>
  <!-- 箭头指示 -->
  <polygon points="32,8 36,18 28,18" fill="#FF4500"/>
  <polygon points="32,56 36,46 28,46" fill="#FF4500"/>
  <!-- 双向箭头 -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="#FF4500" stroke-width="2" stroke-dasharray="4,2"/>
</svg>
