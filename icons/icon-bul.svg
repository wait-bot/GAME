<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bulletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1"/>
      <stop offset="50%" style="stop-color:#6495ED"/>
      <stop offset="100%" style="stop-color:#87CEEB"/>
    </linearGradient>
    <filter id="bulletGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 三叉戟主体 -->
  <rect x="30" y="20" width="4" height="36" fill="url(#bulletGrad)" rx="2"/>
  <!-- 左侧叉 -->
  <path d="M30 24 L18 8 L22 24" fill="url(#bulletGrad)"/>
  <!-- 右侧叉 -->
  <path d="M34 24 L46 8 L42 24" fill="url(#bulletGrad)"/>
  <!-- 中间叉 -->
  <path d="M32 20 L32 4" stroke="url(#bulletGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- 底座 -->
  <ellipse cx="32" cy="58" rx="8" ry="4" fill="url(#bulletGrad)" opacity="0.6"/>
</svg>
