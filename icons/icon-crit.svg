<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="critGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF4500"/>
    </linearGradient>
    <filter id="critGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 爆炸核心 -->
  <circle cx="32" cy="32" r="12" fill="url(#critGrad)" filter="url(#critGlow)"/>
  <!-- 爆炸光芒 -->
  <polygon points="32,4 34,20 32,24 30,20" fill="#FFD700"/>
  <polygon points="60,32 44,34 40,32 44,30" fill="#FFD700"/>
  <polygon points="32,60 30,44 32,40 34,44" fill="#FFD700"/>
  <polygon points="4,32 20,30 24,32 20,34" fill="#FFD700"/>
  <!-- 对角光芒 -->
  <polygon points="52,12 40,24 38,22 44,16" fill="#FF8C00" opacity="0.8"/>
  <polygon points="52,52 44,40 42,42 48,48" fill="#FF8C00" opacity="0.8"/>
  <polygon points="12,52 24,40 26,42 20,48" fill="#FF8C00" opacity="0.8"/>
  <polygon points="12,12 20,24 18,22 12,16" fill="#FF8C00" opacity="0.8"/>
  <!-- 中心高光 -->
  <circle cx="32" cy="32" r="6" fill="#FFF" opacity="0.5"/>
</svg>
