<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#EE5A5A"/>
    </linearGradient>
    <filter id="heartGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 心形主体 -->
  <path d="M32 56 C16 42, 4 30, 4 20 C4 10, 14 4, 24 4 C28 4, 32 8, 32 8 C32 8, 36 4, 40 4 C50 4, 60 10, 60 20 C60 30, 48 42, 32 56 Z" 
        fill="url(#heartGrad)" filter="url(#heartGlow)"/>
  <!-- 高光 -->
  <ellipse cx="18" cy="18" rx="6" ry="4" fill="#FFF" opacity="0.4"/>
</svg>
